name: Build and Push to ACR

on:
  workflow_dispatch:  # this is the workflow for manual trigger

permissions:
  id-token: write
  contents: read
  
jobs:
  build-and-push:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: todo-delete-tasks-api
      IMAGE_TAG: v4
      ACR_NAME: lucktodoappacr2025
      ACR_LOGIN_SERVER: lucktodoappacr2025.azurecr.io

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Azure Login
        uses: Azure/login@v2.3.0
        with:
          client-id: e56aba2e-309d-4313-8091-e641c4c5c43b
          tenant-id: 8810bad7-7f76-4bba-8b17-d6d297d7bdd7
          subscription-id: 2a238ca4-a95b-43d2-846c-1618b53c6203

      - name: Log in to ACR
        run: |
          az acr login --name $ACR_NAME
      - name: Build Docker Image
        run: |
          docker build -t $IMAGE_NAME:$IMAGE_TAG .
      - name: Tag Docker Image for ACR
        run: |
          docker tag $IMAGE_NAME:$IMAGE_TAG $ACR_LOGIN_SERVER/$IMAGE_NAME:$IMAGE_TAG
      - name: Push Docker Image to ACR
        run: |
          docker push $ACR_LOGIN_SERVER/$IMAGE_NAME:$IMAGE_TAG
