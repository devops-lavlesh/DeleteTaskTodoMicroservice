name: Build and Push to ACR

on:
  workflow_dispatch:  # this is the workflow for manual trigger

permissions:
  id-token: write
  contents: read
  
jobs:
  build-and-push:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: todo-delete-tasks-api
      IMAGE_TAG: v4
      ACR_NAME: lucktodoappacr2025
      ACR_LOGIN_SERVER: lucktodoappacr2025.azurecr.io

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Azure Login
        uses: Azure/login@v2.3.0
        with:
          client-id: 6b8deef7-2fd9-461a-80b6-603ebf416096
          tenant-id: bb834039-f8c2-494a-a18d-4d500144099f
          subscription-id: c2a94f1c-4045-4aa8-afec-ee2dbd47e8a4

      - name: Log in to ACR
        run: |
          az acr login --name $ACR_NAME
      - name: Build Docker Image
        run: |
          docker build -t $IMAGE_NAME:$IMAGE_TAG .
      - name: Tag Docker Image for ACR
        run: |
          docker tag $IMAGE_NAME:$IMAGE_TAG $ACR_LOGIN_SERVER/$IMAGE_NAME:$IMAGE_TAG
      - name: Push Docker Image to ACR
        run: |
          docker push $ACR_LOGIN_SERVER/$IMAGE_NAME:$IMAGE_TAG
